<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Apps</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; line-height: 1.6; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; }
        a { text-decoration: none; color: #0066cc; font-size: 1.2rem; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>My Web Apps</h1>
    <ul id="app-list">Loading apps...</ul>

    <script>
        // Replace these with your actual GitHub username and repository name
        const username = 'fabioedoardoluigialberto';
        const repo = 'webapps';
        
        async function loadApps() {
            const listElement = document.getElementById('app-list');
            
            try {
                // Fetch repository contents from GitHub API
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const data = await response.json();
                
                // Clear the loading text
                listElement.innerHTML = '';
                
                // Filter for HTML files and exclude index.html
                const htmlFiles = data.filter(file => 
                    file.name.endsWith('.html') && file.name !== 'index.html'
                );
                
                if (htmlFiles.length === 0) {
                    listElement.innerHTML = '<li>No apps found.</li>';
                    return;
                }
                
                // Render the links
                htmlFiles.forEach(file => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = file.name;
                    // Make the name look nice
                    a.textContent = file.name.replace('.html', '').replace(/[-_]/g, ' ');
                    a.style.textTransform = 'capitalize';
                    
                    li.appendChild(a);
                    listElement.appendChild(li);
                });
            } catch (error) {
                listElement.innerHTML = '<li>Error loading apps. Are you running this locally or did you hit the API rate limit?</li>';
                console.error("Error fetching repo contents:", error);
            }
        }

        loadApps();
    </script>
</body>
</html>
