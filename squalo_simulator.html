<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squalo Financial Simulator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  
  <!-- Babel for parsing JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- PropTypes (Required by Recharts) -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  
  <!-- Recharts (Pinned to stable version to fix ForwardRef UMD error) -->
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // --- IMPORTS & SETUP ---
    const { useState, useMemo } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

    // --- ICONS (Replaced lucide-react with inline SVGs for standalone HTML) ---
    const DollarSign = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
    const Activity = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const Home = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const TrendingUp = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;
    const AlertTriangle = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const Briefcase = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>;

    // Utility for Box-Muller transform (Gaussian noise)
    function randomGauss(mean, stdDev) {
      let u1 = 0, u2 = 0;
      while (u1 === 0) u1 = Math.random();
      while (u2 === 0) u2 = Math.random();
      const z0 = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
      return z0 * stdDev + mean;
    }

    const formatCurrency = (value) => {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(value);
    };

    const TEAR_DOWN_SCHEDULE = { 
      1: 215000, 2: 215000, 3: 215000, 4: 195000, 5: 175000, 
      6: 155000, 7: 135000, 8: 115000, 9: 95000, 10: 75000 
    };

    // Custom Slider Component
    const ControlSlider = ({ label, value, min, max, step, onChange, format = 'number' }) => (
      <div className="mb-4">
        <div className="flex justify-between mb-1">
          <label className="text-sm font-medium text-gray-700">{label}</label>
          <span className="text-sm font-bold text-blue-600">
            {format === 'currency' ? formatCurrency(value) : format === 'percent' ? `${(value * 100).toFixed(1)}%` : value}
          </span>
        </div>
        <input
          type="range"
          min={min}
          max={max}
          step={step}
          value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
        />
      </div>
    );

    function App() {
      // --- STATE (Inputs) ---
      const [capexConstruction, setCapexConstruction] = useState(150000);
      const [capexOther, setCapexOther] = useState(100000);
      const [constructionDuration, setConstructionDuration] = useState(4);
      const [movingInCost, setMovingInCost] = useState(20000);

      const [initialRent, setInitialRent] = useState(12500);
      const [freeRentMonths, setFreeRentMonths] = useState(5);
      const [annualRentIncrease, setAnnualRentIncrease] = useState(0.03);
      const [securityDepositMonths, setSecurityDepositMonths] = useState(3);

      const [revenueInput, setRevenueInput] = useState("20000, 25562, 30000");
      const [revenueRampUp, setRevenueRampUp] = useState(6);
      const [revenueVolatility, setRevenueVolatility] = useState(0.053);
      const [monthlyOpex, setMonthlyOpex] = useState(5000);
      const [processingFee, setProcessingFee] = useState(0.03);

      const [loanAmount, setLoanAmount] = useState(150000);
      const [downPayment, setDownPayment] = useState(100000); // Founders cash
      const [loanInterestRate, setLoanInterestRate] = useState(0.035);
      const [loanTermYears, setLoanTermYears] = useState(5);

      const [enableMoveOut, setEnableMoveOut] = useState(true);
      const [moveOutMonth, setMoveOutMonth] = useState(24); // Default to 24 months (March 2028 / Year 3)
      const [movingOutCost, setMovingOutCost] = useState(20000);
      const [closureDuration, setClosureDuration] = useState(0);
      const [storageCost, setStorageCost] = useState(10000);

      const legalCosts = 5000;

      // --- SIMULATION ENGINE ---
      const { data, summaries } = useMemo(() => {
        const results = [];
        const summaryData = [];
        
        // Parse scenarios
        const scenarios = revenueInput.split(',')
          .map(s => parseInt(s.trim()))
          .filter(s => !isNaN(s));

        if (scenarios.length === 0) scenarios.push(25562); // Fallback

        const startDate = new Date(2026, 2, 1); // March 2026
        const movingOutDate = enableMoveOut ? new Date(startDate.getFullYear(), startDate.getMonth() + moveOutMonth, 1) : null;
        const simulationMonths = 120;

        // Calculate Monthly Loan Payment
        let monthlyLoanPayment = 0;
        if (loanAmount > 0) {
          if (loanInterestRate > 0) {
            const r = loanInterestRate / 12;
            const n = loanTermYears * 12;
            monthlyLoanPayment = loanAmount * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
          } else {
            monthlyLoanPayment = loanAmount / (loanTermYears * 12);
          }
        }

        // Initialize time series array
        for (let i = 0; i < simulationMonths; i++) {
          let d = new Date(startDate);
          d.setMonth(d.getMonth() + i);
          results.push({
            month: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`,
            date: d
          });
        }

        scenarios.forEach(scenarioRev => {
          let currentBalance = 0;
          let currentRent = initialRent;
          let isClosed = false;
          let closureMonthsCounter = 0;
          let payoutReceived = false;

          const totalCapex = capexConstruction + capexOther;
          const securityDeposit = securityDepositMonths * initialRent;
          const initialOutflow = legalCosts + securityDeposit + totalCapex + monthlyOpex;

          const startingCapital = loanAmount + downPayment;
          currentBalance = startingCapital - initialOutflow;
          let minBalance = currentBalance;

          results[0][`Balance_$${scenarioRev}`] = currentBalance;
          results[0][`Revenue_$${scenarioRev}`] = 0;

          const openingDate = new Date(startDate);
          openingDate.setMonth(openingDate.getMonth() + constructionDuration);
          
          const rentStartDate = new Date(startDate);
          rentStartDate.setMonth(rentStartDate.getMonth() + freeRentMonths);

          for (let i = 1; i < simulationMonths; i++) {
            let currentMonthDate = results[i].date;
            let monthlyRevenue = 0;
            let monthlyRentExpense = 0;
            let monthlyMaintenanceCosts = monthlyOpex;
            let currentMonthMovingOutCost = 0;
            let currentMonthMovingInCost = 0;
            let monthlyStorageCost = 0;
            let contingencyPayoutAmount = 0;
            let monthlyProcessingFee = 0;

            // Move Out Logic
            if (enableMoveOut && movingOutDate && currentMonthDate.getTime() === movingOutDate.getTime() && !payoutReceived) {
              let monthsSinceStart = (currentMonthDate.getFullYear() - startDate.getFullYear()) * 12 + (currentMonthDate.getMonth() - startDate.getMonth());
              let yearOfOpAtMoveOut = Math.floor(monthsSinceStart / 12) + 1;
              contingencyPayoutAmount = TEAR_DOWN_SCHEDULE[yearOfOpAtMoveOut] || 0;
              payoutReceived = true;
              currentMonthMovingOutCost = movingOutCost;

              if (closureDuration > 0) {
                isClosed = true;
              } else {
                currentMonthMovingInCost = movingInCost;
              }
            }

            if (isClosed) {
              monthlyRevenue = 0;
              monthlyRentExpense = 0;
              monthlyMaintenanceCosts = 0;
              monthlyStorageCost = storageCost;
              closureMonthsCounter++;

              if (closureMonthsCounter > closureDuration) {
                isClosed = false;
                currentMonthMovingInCost = movingInCost;
              }
            }

            if (!isClosed) {
              // Revenue Logic
              if (currentMonthDate >= openingDate) {
                let monthsSinceOpening = (currentMonthDate.getFullYear() - openingDate.getFullYear()) * 12 + (currentMonthDate.getMonth() - openingDate.getMonth());
                let baseRevenue = scenarioRev;
                
                if (monthsSinceOpening < revenueRampUp && monthsSinceOpening >= 0) {
                  baseRevenue = (scenarioRev / revenueRampUp) * (monthsSinceOpening + 1);
                }

                if (baseRevenue > 0) {
                  let noiseMultiplier = Math.max(0, randomGauss(1.0, revenueVolatility));
                  monthlyRevenue = baseRevenue * noiseMultiplier;
                }

                monthlyProcessingFee = monthlyRevenue * processingFee;
              }

              // Rent Logic
              if (currentMonthDate >= rentStartDate) {
                if (currentMonthDate.getMonth() === 7 && currentMonthDate.getFullYear() > rentStartDate.getFullYear()) {
                  currentRent *= (1 + annualRentIncrease);
                }
                monthlyRentExpense = currentRent;
              } else {
                monthlyRentExpense = 0;
              }
            }

            let currentMonthLoanPayment = 0;
            if (i <= loanTermYears * 12) {
              currentMonthLoanPayment = monthlyLoanPayment;
            }

            let netCashFlow = monthlyRevenue - monthlyRentExpense - monthlyMaintenanceCosts - monthlyProcessingFee - currentMonthLoanPayment - currentMonthMovingOutCost - currentMonthMovingInCost - monthlyStorageCost + contingencyPayoutAmount;
            currentBalance += netCashFlow;

            if (currentBalance < minBalance) {
              minBalance = currentBalance;
            }

            results[i][`Balance_$${scenarioRev}`] = Math.round(currentBalance);
            results[i][`Revenue_$${scenarioRev}`] = Math.round(monthlyRevenue);
          }

          summaryData.push({
            scenario: scenarioRev,
            finalBalance: currentBalance,
            minBalance: minBalance
          });
        });

        return { data: results, summaries: summaryData };
      }, [
        capexConstruction, capexOther, constructionDuration, movingInCost,
        initialRent, freeRentMonths, annualRentIncrease, securityDepositMonths,
        revenueInput, revenueRampUp, revenueVolatility, monthlyOpex, processingFee,
        enableMoveOut, moveOutMonth, movingOutCost, closureDuration, storageCost,
        loanAmount, downPayment, loanInterestRate, loanTermYears
      ]);

      const COLORS = ['#2563eb', '#16a34a', '#d97706', '#dc2626', '#9333ea', '#0891b2'];
      const scenarios = revenueInput.split(',').map(s => parseInt(s.trim())).filter(s => !isNaN(s));

      // UI Helpers for Loan
      const totalInitialOutflow = legalCosts + (securityDepositMonths * initialRent) + capexConstruction + capexOther + monthlyOpex;
      const initialBuffer = (loanAmount + downPayment) - totalInitialOutflow;
      let displayMonthlyPayment = 0;
      if (loanAmount > 0) {
        if (loanInterestRate > 0) {
          const r = loanInterestRate / 12;
          const n = loanTermYears * 12;
          displayMonthlyPayment = loanAmount * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        } else {
          displayMonthlyPayment = loanAmount / (loanTermYears * 12);
        }
      }

      return (
        <div className="flex h-screen w-full font-sans overflow-hidden">
          
          {/* SIDEBAR */}
          <div className="w-80 bg-white border-r border-gray-200 shadow-sm flex flex-col h-full overflow-y-auto">
            <div className="p-5 border-b border-gray-100 bg-blue-600 text-white sticky top-0 z-10">
              <h1 className="text-xl font-bold flex items-center gap-2">
                <Activity size={24} /> Squalo Simulator
              </h1>
              <p className="text-blue-100 text-sm mt-1">Live Financial Projections</p>
            </div>

            <div className="p-5 space-y-8">
              
              {/* Section 1 */}
              <section>
                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                  <Home size={16} /> Capital & Build
                </h2>
                <ControlSlider label="Construction CapEx" value={capexConstruction} min={50000} max={300000} step={10000} onChange={setCapexConstruction} format="currency" />
                <ControlSlider label="Tech & Furniture" value={capexOther} min={50000} max={200000} step={5000} onChange={setCapexOther} format="currency" />
                <ControlSlider label="Construction (Months)" value={constructionDuration} min={1} max={12} step={1} onChange={setConstructionDuration} />
                <ControlSlider label="Future Move-In Cost" value={movingInCost} min={0} max={50000} step={5000} onChange={setMovingInCost} format="currency" />
              </section>

              {/* Section 2 */}
              <section>
                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                  <DollarSign size={16} /> Lease Terms
                </h2>
                <ControlSlider label="Starting Gross Rent" value={initialRent} min={5000} max={25000} step={500} onChange={setInitialRent} format="currency" />
                <ControlSlider label="Free Rent Period" value={freeRentMonths} min={0} max={12} step={1} onChange={setFreeRentMonths} />
                <ControlSlider label="Annual Rent Increase" value={annualRentIncrease} min={0.0} max={0.10} step={0.005} onChange={setAnnualRentIncrease} format="percent" />
                <ControlSlider label="Security Deposit (Mo)" value={securityDepositMonths} min={1} max={6} step={1} onChange={setSecurityDepositMonths} />
              </section>

              {/* Section 3 */}
              <section>
                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                  <TrendingUp size={16} /> Revenue & OpEx
                </h2>
                <div className="mb-4">
                  <label className="text-sm font-medium text-gray-700 block mb-1">Revenue Scenarios ($/mo)</label>
                  <input 
                    type="text" 
                    value={revenueInput} 
                    onChange={(e) => setRevenueInput(e.target.value)}
                    className="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-blue-500 focus:border-blue-500"
                    placeholder="20000, 25562, 30000"
                  />
                </div>
                <ControlSlider label="Ramp-Up Time (Mo)" value={revenueRampUp} min={1} max={12} step={1} onChange={setRevenueRampUp} />
                <ControlSlider label="Revenue Volatility" value={revenueVolatility} min={0.0} max={0.20} step={0.01} onChange={setRevenueVolatility} format="percent" />
                <ControlSlider label="Fixed OpEx (Tech/Ins)" value={monthlyOpex} min={2000} max={15000} step={500} onChange={setMonthlyOpex} format="currency" />
                <ControlSlider label="Processing Fee" value={processingFee} min={0.0} max={0.05} step={0.005} onChange={setProcessingFee} format="percent" />
              </section>

              {/* Section 4 */}
              <section>
                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                  <Briefcase size={16} /> Financing (Capital)
                </h2>
                <ControlSlider label="Loan Amount" value={loanAmount} min={0} max={500000} step={10000} onChange={setLoanAmount} format="currency" />
                <ControlSlider label="Founders Down Payment" value={downPayment} min={0} max={500000} step={10000} onChange={setDownPayment} format="currency" />
                <ControlSlider label="Loan Interest Rate" value={loanInterestRate} min={0.0} max={0.15} step={0.005} onChange={setLoanInterestRate} format="percent" />
                <ControlSlider label="Loan Term (Years)" value={loanTermYears} min={1} max={15} step={1} onChange={setLoanTermYears} />
                
                <div className="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-lg space-y-2">
                  <div className="flex justify-between text-sm">
                    <span className="text-gray-600">Total Upfront Cost:</span>
                    <span className="font-semibold">{formatCurrency(totalInitialOutflow)}</span>
                  </div>
                  <div className="flex justify-between text-sm">
                    <span className="text-gray-600">Initial Cash Buffer:</span>
                    <span className={`font-semibold ${initialBuffer < 0 ? 'text-red-500' : 'text-green-600'}`}>
                      {formatCurrency(initialBuffer)}
                    </span>
                  </div>
                  <div className="flex justify-between text-sm pt-2 border-t border-blue-200">
                    <span className="text-gray-800 font-medium">Monthly Loan Payment:</span>
                    <span className="font-bold text-blue-700">{formatCurrency(displayMonthlyPayment)}</span>
                  </div>
                </div>
              </section>

              {/* Section 5 */}
              <section>
                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                  <AlertTriangle size={16} /> Buyout / Demolition
                </h2>
                <div className="flex items-center gap-2 mb-4 bg-gray-100 p-3 rounded-md">
                  <input 
                    type="checkbox" 
                    id="enableMoveOut" 
                    checked={enableMoveOut} 
                    onChange={(e) => setEnableMoveOut(e.target.checked)}
                    className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500"
                  />
                  <label htmlFor="enableMoveOut" className="text-sm font-medium text-gray-700 cursor-pointer">
                    Trigger Move-Out Clause
                  </label>
                </div>
                
                {enableMoveOut && (
                  <div className="space-y-4 border-l-2 border-blue-400 pl-3 ml-1">
                    <ControlSlider label="Move-Out Month (from start)" value={moveOutMonth} min={12} max={119} step={1} onChange={setMoveOutMonth} />
                    <div className="text-xs text-gray-500 mb-2 -mt-2">
                      Expected Payout: <span className="font-bold text-green-600">{formatCurrency(TEAR_DOWN_SCHEDULE[Math.floor(moveOutMonth / 12) + 1] || 0)}</span> (Year {Math.floor(moveOutMonth / 12) + 1})
                    </div>
                    <ControlSlider label="Tear-Down Cost" value={movingOutCost} min={0} max={50000} step={5000} onChange={setMovingOutCost} format="currency" />
                    <ControlSlider label="Closure Gap (Months)" value={closureDuration} min={0} max={12} step={1} onChange={setClosureDuration} />
                    <ControlSlider label="Storage Cost ($/mo)" value={storageCost} min={0} max={20000} step={1000} onChange={setStorageCost} format="currency" />
                  </div>
                )}
              </section>

            </div>
          </div>

          {/* MAIN CONTENT */}
          <div className="flex-1 p-6 overflow-y-auto flex flex-col gap-6">
            
            {/* Metric Cards */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              {summaries.map((sum, idx) => (
                <div key={sum.scenario} className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full" style={{ backgroundColor: COLORS[idx % COLORS.length] }}></div>
                  <h3 className="text-gray-500 text-sm font-semibold mb-1">Scenario: {formatCurrency(sum.scenario)}/mo</h3>
                  <div className="mt-2">
                    <p className="text-2xl font-bold text-gray-900">{formatCurrency(sum.finalBalance)}</p>
                    <p className="text-xs text-gray-500 mt-1">10-Year Final Bank Balance</p>
                  </div>
                  <div className="mt-4 pt-3 border-t border-gray-50">
                    <p className={`text-sm font-medium ${sum.minBalance < 0 ? 'text-red-500' : 'text-green-500'}`}>
                      Max Dip: {formatCurrency(sum.minBalance)}
                    </p>
                  </div>
                </div>
              ))}
            </div>

            {/* Charts */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex-1 min-h-[400px]">
              <h2 className="text-lg font-bold text-gray-800 mb-4">Bank Account Balance Over Time</h2>
              <ResponsiveContainer width="100%" height="85%">
                <LineChart data={data} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                  <XAxis dataKey="month" tick={{ fontSize: 12, fill: '#6B7280' }} tickMargin={10} minTickGap={30} />
                  <YAxis tickFormatter={(val) => `$${val / 1000}k`} tick={{ fontSize: 12, fill: '#6B7280' }} width={80} />
                  <Tooltip 
                    formatter={(value) => formatCurrency(value)}
                    labelStyle={{ fontWeight: 'bold', color: '#374151' }}
                    contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)' }}
                  />
                  <Legend verticalAlign="top" height={36} iconType="circle" />
                  {scenarios.map((rev, idx) => (
                    <Line 
                      key={`Balance_$${rev}`}
                      type="monotone" 
                      dataKey={`Balance_$${rev}`} 
                      name={`$${rev.toLocaleString()}/mo`}
                      stroke={COLORS[idx % COLORS.length]} 
                      strokeWidth={2}
                      dot={false}
                      activeDot={{ r: 6 }}
                    />
                  ))}
                </LineChart>
              </ResponsiveContainer>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 min-h-[300px]">
              <h2 className="text-lg font-bold text-gray-800 mb-4">Monthly Revenue (with Volatility)</h2>
              <ResponsiveContainer width="100%" height="85%">
                <LineChart data={data} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                  <XAxis dataKey="month" tick={{ fontSize: 12, fill: '#6B7280' }} tickMargin={10} minTickGap={30} />
                  <YAxis tickFormatter={(val) => `$${val / 1000}k`} tick={{ fontSize: 12, fill: '#6B7280' }} width={80} />
                  <Tooltip 
                    formatter={(value) => formatCurrency(value)}
                    labelStyle={{ fontWeight: 'bold', color: '#374151' }}
                    contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)' }}
                  />
                  {scenarios.map((rev, idx) => (
                    <Line 
                      key={`Revenue_$${rev}`}
                      type="monotone" 
                      dataKey={`Revenue_$${rev}`} 
                      name={`$${rev.toLocaleString()}/mo`}
                      stroke={COLORS[idx % COLORS.length]} 
                      strokeWidth={2}
                      dot={false}
                      opacity={0.8}
                    />
                  ))}
                </LineChart>
              </ResponsiveContainer>
            </div>

          </div>
        </div>
      );
    }

    // --- MOUNT THE APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
